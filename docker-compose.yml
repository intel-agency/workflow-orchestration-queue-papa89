# OS-APOW Docker Compose
# Full stack orchestration for development and testing

services:
  notifier:
    build:
      context: .
      dockerfile: Dockerfile.notifier
    container_name: os-apow-notifier
    ports:
      - "8000:8000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - os-apow-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  sentinel:
    build:
      context: .
      dockerfile: Dockerfile.sentinel
    container_name: os-apow-sentinel
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=${GITHUB_REPO}
      - SENTINEL_BOT_LOGIN=${SENTINEL_BOT_LOGIN:-}
    volumes:
      - ./scripts:/app/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      notifier:
        condition: service_healthy
    networks:
      - os-apow-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

networks:
  os-apow-network:
    driver: bridge
