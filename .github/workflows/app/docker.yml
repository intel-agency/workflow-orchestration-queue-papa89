# OS-APOW Docker Build Workflow
# Builds and tests Docker images

name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.github/workflows/app/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.github/workflows/app/docker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Sentinel image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.sentinel
          push: false
          tags: os-apow-sentinel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Notifier image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.notifier
          push: false
          tags: os-apow-notifier:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  hadolint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    container:
      image: hadolint/hadolint:latest-alpine
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Dockerfile.sentinel
        run: hadolint Dockerfile.sentinel

      - name: Lint Dockerfile.notifier
        run: hadolint Dockerfile.notifier
